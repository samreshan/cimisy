name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # Required for npm's OIDC "trusted publishing" (no long-lived NPM_TOKEN).
  # Configure the trusted publisher for this package on npmjs.com, pointing
  # at this repo + this workflow file, before the first automated publish.
  id-token: write

jobs:
  release:
    name: Version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          # Pinned to an exact patch, not a floating major — see ci.yml for
          # why (pnpm 11.12.0's self-installer crashes on this lockfile).
          version: 11.10.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # OIDC trusted publishing needs a recent npm CLI (>=11.5.1). Pin to the
      # 11.x line rather than floating @latest: npm 12 changed the `npm
      # publish --json` error-object shape, which crashes @changesets/cli's
      # (2.31.0, latest stable) already-published detection.
      - name: Ensure a recent npm for OIDC trusted publishing
        run: npm install -g npm@11

      # dist/ is gitignored and the example apps import cimisy via its
      # subpath exports (cimisy/next, cimisy/config, ...), which resolve to
      # ./dist/*. Build before typecheck so those imports resolve.
      - name: Build
        run: pnpm run build

      - name: Lint / typecheck / test
        run: |
          pnpm run lint
          pnpm run typecheck
          pnpm run test

      - name: Version packages or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fallback for registries/setups that haven't configured npm trusted
          # publishing yet: add an automation-scoped NPM_TOKEN repo secret and
          # it's picked up automatically. Prefer trusted publishing (above)
          # when available — it avoids a long-lived publish credential
          # entirely, which fits a security-first project.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
