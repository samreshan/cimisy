name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: lint / typecheck / test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          # Pinned to an exact patch, not a floating major: pnpm 11.12.0's
          # self-installer crashes ("Cannot use 'in' operator to search for
          # 'integrity' in undefined") parsing this repo's lockfile, which
          # broke CI on every push/PR from 2026-07-13 onward regardless of
          # what changed in the repo. Bump deliberately once a working
          # newer patch is confirmed, not by widening back to a range.
          version: 11.10.0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # dist/ is gitignored and the example apps import cimisy via its
      # subpath exports (cimisy/next, cimisy/config, ...), which resolve to
      # ./dist/*. Build before lint/typecheck so those imports resolve.
      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test
